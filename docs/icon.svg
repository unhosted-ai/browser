<?xml version="1.0" encoding="UTF-8"?>
<!--
  Delta — favicon for the GitHub Pages site. Mirrors brand/icon.svg
  (cream squircle + black mark) but inverts colours under
  prefers-color-scheme: dark so the favicon stays legible against dark
  browser chrome. Browsers re-evaluate the media query when the OS
  theme flips, so this single file covers both registers.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <title>Delta</title>
  <style>
    .canvas { fill: #f5f5f0; }
    .mark   { fill: #0a0a0a; stroke: #0a0a0a; }
    @media (prefers-color-scheme: dark) {
      .canvas { fill: #0a0a0a; }
      .mark   { fill: #f5f5f0; stroke: #f5f5f0; }
    }
  </style>
  <defs>
    <clipPath id="squircle-clip">
      <rect width="1024" height="1024" rx="186" ry="186"/>
    </clipPath>
  </defs>
  <g clip-path="url(#squircle-clip)">
    <rect class="canvas" width="1024" height="1024"/>
    <circle class="mark" cx="512" cy="148" r="56"/>
    <path
      class="mark"
      d="M 512 276 L 896 896 L 128 896 Z"
      fill="none"
      stroke-width="36"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
  </g>
</svg>
