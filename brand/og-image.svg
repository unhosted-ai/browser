<?xml version="1.0" encoding="UTF-8"?>
<!--
  Unhosted Browser — Open Graph / social-share card. 1200×630, rendered by
  X/LinkedIn/Discord/Slack/iMessage when a link to
  https://unhosted-ai.github.io/browser/ is unfurled.

  Composition: cream canvas, the three-ring Unhosted mark on the left, the
  "unhosted browser" wordmark + tagline on the right. Matches brand/icon.svg
  and the light register so unfurled links feel like the same brand.

  No SVG filters or external fonts at render time — paths/rects/text with
  system fallbacks so it rasterises identically across renderers.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <title>Unhosted Browser — Open Graph card</title>

  <rect width="1200" height="630" fill="#f5f5f0"/>
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none"
        stroke="rgba(10,10,10,0.08)" stroke-width="1"/>

  <!-- Three-ring Unhosted mark on the left, centred at (240, 315). -->
  <g fill="none" stroke="#0a0a0a" stroke-width="12">
    <circle cx="240" cy="315" r="132" stroke-dasharray="6 18"/>
    <circle cx="240" cy="315" r="84"/>
    <circle cx="240" cy="315" r="36" fill="#0a0a0a" stroke="none"/>
  </g>

  <!-- Wordmark on the right — mono, "browser" in the mute tone. Sized to
       stay inside the 1200 canvas with right margin. -->
  <text x="470" y="300"
        font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
        font-weight="700" font-size="82" letter-spacing="-4">
    <tspan fill="#0a0a0a">unhosted</tspan><tspan fill="#737373"> browser</tspan>
  </text>

  <!-- Tagline. -->
  <text x="472" y="360"
        font-family="'Instrument Serif', ui-serif, Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="34" fill="#0a0a0a">a privacy-first ai browser — part of unhosted</text>

  <!-- Three badges. -->
  <g font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="500" fill="#0a0a0a">
    <g transform="translate(470, 410)">
      <rect width="140" height="44" rx="10" fill="rgba(10,10,10,0.04)" stroke="rgba(10,10,10,0.18)"/>
      <text x="70" y="29" text-anchor="middle">local-first</text>
    </g>
    <g transform="translate(624, 410)">
      <rect width="155" height="44" rx="10" fill="rgba(10,10,10,0.04)" stroke="rgba(10,10,10,0.18)"/>
      <text x="77.5" y="29" text-anchor="middle">open-source</text>
    </g>
    <g transform="translate(793, 410)">
      <rect width="170" height="44" rx="10" fill="rgba(10,10,10,0.04)" stroke="rgba(10,10,10,0.18)"/>
      <text x="85" y="29" text-anchor="middle">no telemetry</text>
    </g>
  </g>

  <text x="1170" y="595" text-anchor="end"
        font-family="'JetBrains Mono', ui-monospace, Menlo, monospace"
        font-size="18" fill="rgba(10,10,10,0.5)">github.com/unhosted-ai/browser</text>
</svg>
