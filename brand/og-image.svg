<?xml version="1.0" encoding="UTF-8"?>
<!--
  Delta — Open Graph / social-share card. 1200×630, the standard size
  rendered by Twitter/X, LinkedIn, Discord, Slack, iMessage when a link
  to https://delta-practice.github.io/Browser/ is unfurled.

  Composition: dark canvas, mint Δ + spark on the left at ~30% width,
  giant lowercase "delta" wordmark + tagline on the right. Mirrors the
  app's dark register so unfurled links feel like the same brand.

  No SVG filters or external fonts at render time — everything is paths,
  rects, and a single inline text element with system-serif fallbacks
  so it rasterises identically across rsvg-convert / Cairo / WebKit.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <title>Delta — Open Graph card</title>

  <defs>
    <!-- Dark gradient canvas, same hues as brand/icon.svg. -->
    <linearGradient id="canvas" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"    stop-color="hsl(225 14% 12%)"/>
      <stop offset="0.55" stop-color="hsl(230 11% 7%)"/>
      <stop offset="1"    stop-color="hsl(232 13% 4%)"/>
    </linearGradient>
    <linearGradient id="delta" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"    stop-color="hsl(132 70% 78%)"/>
      <stop offset="0.55" stop-color="hsl(135 55% 64%)"/>
      <stop offset="1"    stop-color="hsl(140 55% 48%)"/>
    </linearGradient>
  </defs>

  <!-- Canvas. -->
  <rect width="1200" height="630" fill="url(#canvas)"/>

  <!-- Subtle hairline border so the card has an edge on white-bg
       previews (Slack, iMessage). -->
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none"
        stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Δ + spark on the left. The whole composition fits in a 360×360
       square centred at (240, 315). -->
  <circle cx="240" cy="170" r="22" fill="hsl(135 70% 78%)"/>
  <path d="M 240 215 L 380 460 L 100 460 Z"
        fill="url(#delta)" fill-opacity="0.22"
        stroke="url(#delta)" stroke-width="6" stroke-linejoin="round"/>

  <!-- "delta" wordmark on the right. Bold sans for the brand stamp. -->
  <text x="490" y="320"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="900"
        font-size="160"
        letter-spacing="-6"
        fill="hsl(0 0% 96%)">delta</text>

  <!-- Tagline — lowercase, system serif italic for the editorial register. -->
  <text x="492" y="380"
        font-family="'Instrument Serif', ui-serif, Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="34"
        fill="hsl(135 55% 64%)">a privacy-first ai browser</text>

  <!-- Three small badges — mirror the site's hero badges. -->
  <g font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="500" fill="hsl(0 0% 80%)">
    <g transform="translate(490, 430)">
      <rect width="140" height="44" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
      <text x="70" y="29" text-anchor="middle">local-first</text>
    </g>
    <g transform="translate(644, 430)">
      <rect width="155" height="44" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
      <text x="77.5" y="29" text-anchor="middle">open-source</text>
    </g>
    <g transform="translate(813, 430)">
      <rect width="170" height="44" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
      <text x="85" y="29" text-anchor="middle">no telemetry</text>
    </g>
  </g>

  <!-- Tiny URL line at the very bottom — bottom-right, mono, mute. -->
  <text x="1170" y="595"
        text-anchor="end"
        font-family="'JetBrains Mono', ui-monospace, Menlo, monospace"
        font-size="18"
        fill="rgba(255,255,255,0.45)">github.com/Delta-Practice/Browser</text>
</svg>
