<?xml version="1.0" encoding="UTF-8"?>
<!--
  Unhosted Browser wordmark, cream-background variant.

  Mirrors brand/wordmark.svg but on the warm off-white ground with near-black
  type: "unhosted" in #0a0a0a, "browser" in the mute #737373. Use on the
  GitHub Pages landing page and any cream-register marketing.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 100">
  <title>unhosted browser — cream</title>
  <rect x="-20" y="-10" width="800" height="120" fill="#f5f5f0"/>
  <text font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
        font-size="96" font-weight="700" letter-spacing="-2">
    <tspan x="0" y="80" fill="#0a0a0a">unhosted</tspan><tspan fill="#737373"> browser</tspan>
  </text>
</svg>
