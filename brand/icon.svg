<?xml version="1.0" encoding="UTF-8"?>
<!--
  Delta — application icon. 1024×1024 master.

  Concept: pure line-art Δ with a small spark dot above the apex, set on
  a cream squircle. The composition is the same as brand/icon-mark.svg —
  one mark, two registers (this one for dock/squircle contexts, the
  unbounded line-art for inline use). Cream + black, no gradient, no
  shadow, no glow: the icon reads the same at 16px and 1024px.

  Apple HIG: ~100pt of breathing room around the artwork inside an 824
  safe area on a 1024 grid. The Δ + spark composition sits inside that.

  No SVG filters — only paths/rects — so every iconset size from 16 up
  rasterises edge-clean. Transparency outside the squircle relies on a
  renderer that respects SVG alpha (rsvg-convert; brand/scripts/
  build-icons.sh prefers it over qlmanage for that reason).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <title>Delta — application icon</title>

  <defs>
    <clipPath id="squircle-clip">
      <rect width="1024" height="1024" rx="232" ry="232"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle-clip)">
    <!-- Cream squircle canvas. Matches the paper background used on the
         GitHub Pages site so app, dock, and web all share one ground. -->
    <rect width="1024" height="1024" fill="#f5f5f0"/>

    <!--
      Spark — small filled black dot above the apex of the Δ. Same
      proportional placement as brand/icon-mark.svg so the mark family
      stays visually coherent across registers.
    -->
    <circle cx="512" cy="164" r="46" fill="#0a0a0a"/>

    <!--
      Δ — line-art triangle, single stroke weight. Scaled from the 200
      viewBox source: stroke-width 6 there → ~30 here. Linejoin round
      keeps the apex from punching through the safe area.
    -->
    <path
      d="M 512 307 L 860 860 L 164 860 Z"
      fill="none"
      stroke="#0a0a0a"
      stroke-width="30"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
  </g>
</svg>
