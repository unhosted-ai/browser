<?xml version="1.0" encoding="UTF-8"?>
<!--
  Delta — application icon. 1024×1024 master.

  Composition: pure line-art Δ with a small spark dot above the apex, set
  on a cream squircle. The squircle fills the canvas edge-to-edge (no
  Apple-style 100px padding) so the icon reads at full dock-cell size
  alongside third-party icons like Slack and VS Code. Corner radius
  186/1024 (18.2%) matches the tighter, third-party-app convention.
  The triangle + spark composition takes ~84% of the canvas height so
  the icon feels filled at every size from 16 up.

  No SVG filters — only paths/rects — so every iconset size from 16 to
  1024 rasterises edge-clean. Transparency outside the squircle relies
  on a renderer that respects SVG alpha (rsvg-convert; brand/scripts/
  build-icons.sh prefers it over qlmanage for that reason).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <title>Delta — application icon</title>

  <defs>
    <clipPath id="squircle-clip">
      <rect width="1024" height="1024" rx="186" ry="186"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle-clip)">
    <!-- Cream squircle canvas. Matches the paper background used on the
         GitHub Pages site so app, dock, and web all share one ground. -->
    <rect width="1024" height="1024" fill="#f5f5f0"/>

    <!--
      Spark — small filled black dot above the apex of the Δ. Same
      proportional placement as brand/icon-mark.svg so the mark family
      stays visually coherent across registers. Bumped 20% larger here
      so the dot reads at 16px and 32px favicon sizes too.
    -->
    <circle cx="512" cy="148" r="56" fill="#0a0a0a"/>

    <!--
      Δ — line-art triangle, single stroke weight. Scaled to occupy
      roughly the lower 2/3 of the squircle: apex at y=276, base at
      y=896 (876 wide), centred. Linejoin/cap round keeps the apex
      from punching through the safe area visually. Stroke 36px so
      the lines read clean at small sizes without overpowering the
      dot.
    -->
    <path
      d="M 512 276 L 896 896 L 128 896 Z"
      fill="none"
      stroke="#0a0a0a"
      stroke-width="36"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
  </g>
</svg>
