<?xml version="1.0" encoding="UTF-8"?>
<!--
  Unhosted Browser — application icon. 1024×1024 master.

  Composition: the three concentric Unhosted rings (dashed swarm · solid
  trusted · filled you) centred on a warm off-white squircle. The mark is
  the unmodified Unhosted mark, scaled ×8 from the canonical unhosted-core
  geometry (44/28/12 on a 100 grid) so app, dock, and web share one
  identity; the browser product is carried by the wordmark, not the mark.
  Corner radius 186/1024 (18.2%) matches the tighter, third-party-app
  convention.

  No SVG filters — only circles/paths/rects — so every iconset size from 16
  to 1024 rasterises edge-clean. Transparency outside the squircle relies on
  a renderer that respects SVG alpha (rsvg-convert; brand/scripts/
  build-icons.sh prefers it over qlmanage for that reason).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <title>Unhosted Browser — application icon</title>

  <defs>
    <clipPath id="squircle-clip">
      <rect width="1024" height="1024" rx="186" ry="186"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle-clip)">
    <!-- Cream squircle ground — matches the Unhosted paper background so
         app, dock, and web all share one ground. -->
    <rect width="1024" height="1024" fill="#f5f5f0"/>

    <!--
      Three-ring Unhosted mark, scaled ×8 from the 100-grid canonical
      (cx/cy 512, radii 352/224/96, stroke 26). Dashed outer = public
      swarm, solid middle = trusted circle, filled inner = you. Near-black
      on cream. The mark is unmodified; "browser" lives in the wordmark.
    -->
    <g fill="none" stroke="#0a0a0a" stroke-width="26">
      <circle cx="512" cy="512" r="352" stroke-dasharray="16 48"/>
      <circle cx="512" cy="512" r="224"/>
      <circle cx="512" cy="512" r="96" fill="#0a0a0a" stroke="none"/>
    </g>
  </g>
</svg>
