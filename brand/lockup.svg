<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 100">
  <title>unhosted browser</title>
  <!-- Mark + wordmark, horizontal. Mark geometry identical to unhosted-core;
       the muted "browser" word carries the product distinction. -->
  <g fill="none" stroke="currentColor" stroke-width="3">
    <circle cx="50" cy="50" r="44" stroke-dasharray="2 6"/>
    <circle cx="50" cy="50" r="28"/>
    <circle cx="50" cy="50" r="12" fill="currentColor" stroke="none"/>
  </g>
  <text x="125" y="80"
        font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
        font-size="72" font-weight="700" letter-spacing="-2">
    <tspan fill="currentColor">unhosted</tspan><tspan fill="#737373"> browser</tspan>
  </text>
</svg>
