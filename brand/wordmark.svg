<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 100">
  <title>unhosted browser</title>
  <!--
    Unhosted Browser wordmark. Family-consistent with unhosted-core:
    ui-monospace, size 96, weight 700, letter-spacing -2. The product is
    distinguished the way brand families do it — same "unhosted" wordmark,
    with "browser" in the muted tone (#737373) at the same size. Uses
    currentColor for "unhosted" so it inverts cleanly on light/dark grounds.
  -->
  <text font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
        font-size="96" font-weight="700" letter-spacing="-2">
    <tspan x="0" y="80" fill="currentColor">unhosted</tspan><tspan fill="#737373"> browser</tspan>
  </text>
</svg>
