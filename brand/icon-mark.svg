<?xml version="1.0" encoding="UTF-8"?>
<!--
  Unhosted Browser — minimal line-art mark (inline register).

  The canonical three-ring Unhosted mark, unmodified, on a 200×200 grid,
  using `currentColor` so it tints to the surrounding page. Companion to
  brand/icon.svg (the app icon on a cream squircle) and brand/logo.svg (the
  100-grid mark). Ring radii scaled ×2 from the canonical 100-grid geometry
  (88/56/24, stroke 6).

  Use it for:
    • GitHub Pages footer / header marks
    • README hero
    • Slack / Discord avatars where chrome already provides a background

  Per unhosted-core BRAND.md the mark is the architecture and is not altered;
  the browser product is carried by the wordmark, not this mark.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"
     fill="none" stroke="currentColor" stroke-width="6" aria-label="Unhosted">
  <title>Unhosted — line-art mark</title>
  <circle cx="100" cy="100" r="88" stroke-dasharray="4 12"/>
  <circle cx="100" cy="100" r="56"/>
  <circle cx="100" cy="100" r="24" fill="currentColor" stroke="none"/>
</svg>
